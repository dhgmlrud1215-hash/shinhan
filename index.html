<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/slick.css">
    <link rel="stylesheet" href="css/main.css?v=4">

    <script src="https://code.jquery.com/jquery-1.11.2.min.js"></script>
    <script src="js/slick.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react@17/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-router-dom@5/umd/react-router-dom.min.js"></script>
</head>
<body>
<div id="root"></div>

    <script type="text/babel" src="js/Header.js"></script>
    <script type="text/babel" src="js/Navi.js"></script>
    <script type="text/babel" src="js/Home.js"></script>
    <script type="text/babel" src="js/Footer.js"></script>

    <script type="text/babel">

    function Shinhan() {
        const {
            HashRouter,
            Route,
            Link,
            Switch
        } = window.ReactRouterDOM;

        return (
            <HashRouter>
                <Header/>
                <Navi/>

                <Switch>
                    <Route exact path ="/" component={Home}/>
                </Switch>

                <Footer/>
            </HashRouter>
        );
    }

    ReactDOM.render(
        <Shinhan/>,
        document.getElementById("root")
    )
    </script>

    
</body>
</html>
